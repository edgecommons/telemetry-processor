name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo. `secrets: inherit` passes the org-level
    # EDGECOMMONS_READ_TOKEN so cargo can fetch the private edgecommons git dependency. The repo must be
    # added to that secret's repository allow-list (org Actions secrets, via the REST API).
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
      # scripting-lua builds the optional Lua 5.4 engine (mlua's vendored PUC Lua — a C build; the
      # ubuntu runner has gcc) so both script engines are compiled + tested in CI.
      rust-features: "streaming,streaming-file-parquet,streaming-file-avro,scripting-lua"
    secrets: inherit

  coverage:
    # The 90% line-coverage gate (org validation matrix / AGENTS.md), actually RUN here (the
    # reusable component-ci only does build/test/clippy). This repo has no live-infra driver seam of
    # its own — the Kinesis/Kafka/file-sink clients live in the `edgecommons`/`edgestreamlog`
    # library, not here — so the genuine untestable surface is narrower than a southbound adapter's:
    # only `main.rs` (the runtime bootstrap shim) and `app.rs` (`ProcessorApp::start`/`build_route`/
    # `run`, the composition root that must obtain a live `Config`/`Arc<dyn MessagingService>`/
    # `EventsFacade`/`Arc<CommandInbox>`/`Arc<dyn StreamService>` from a real `EdgeCommons` — none of
    # which has a public or test constructor outside the `edgecommons` crate) are excluded, each
    # pinned to its reason in `src/app.rs`'s module doc and `AGENTS.md`. `test_support.rs` (this
    # crate's own downstream `MessagingService` fake, the analog of the library's crate-private
    # `testutil::RecordingMessaging`) is test-only support code, not production logic, and is
    # excluded the same way `file-replicator` excludes its `testutil.rs`. Every piece of logic that
    # does NOT need a live `EdgeCommons` directly — the fan-out handler, the command/panel
    # registration, the route dispatcher, the pipeline stages, config parsing — is unit-tested and
    # stays in the denominator. Do not lower the gate or exclude testable code to pass it — add tests.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Authenticate to the private edgecommons git dependency
        env:
          # Same org read token the reusable workflow uses (secrets: inherit); the repo must be on
          # that secret's allow-list. Rewrites the https git URL so cargo can fetch the private dep.
          EDGECOMMONS_READ_TOKEN: ${{ secrets.EDGECOMMONS_READ_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/edgecommons/edgecommons.git".insteadOf \
            "https://github.com/edgecommons/edgecommons.git"
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/edgecommons/edgecommons".insteadOf \
            "https://github.com/edgecommons/edgecommons"
          git config --global \
            url."https://x-access-token:${EDGECOMMONS_READ_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
      - name: Coverage gate (90% lines; composition root + main.rs + test-only messaging fake excluded)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: >
          cargo llvm-cov --locked --features streaming,streaming-file-parquet,streaming-file-avro,scripting-lua
          --ignore-filename-regex '(app|main|test_support)\.rs'
          --fail-under-lines 90
